name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Python tests
        run: python -m pytest

      - name: Run Node tests
        run: npm test

      - name: Run smoke test
        run: python scripts/smoke.py

      - name: Run readiness audit
        run: |
          python scripts/readiness.py > /tmp/phonebio-readiness.json
          python -m json.tool /tmp/phonebio-readiness.json > /dev/null

      - name: Validate Vapi dry-run payload
        run: |
          python vapi/wire.py create-assistant --assign-phone --dry-run > /tmp/phonebio-wire.json
          python -m json.tool /tmp/phonebio-wire.json > /dev/null

      - name: Validate JSON and JSONL files
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          for path in sorted(Path(".").rglob("*")):
              if ".git" in path.parts or not path.is_file():
                  continue
              if path.suffix == ".json":
                  with path.open(encoding="utf-8") as handle:
                      json.load(handle)
              elif path.suffix == ".jsonl":
                  with path.open(encoding="utf-8") as handle:
                      for line_number, line in enumerate(handle, 1):
                          if line.strip():
                              json.loads(line)
          PY

      - name: Scan for committed secret material
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          pieces = [
              "gh" + "o_",
              "s" + "k-",
              r"VAPI_" + r"(PRIVATE_KEY|API_KEY)=.+",
              r"NEBIUS_" + r"API_KEY=.+",
              r"OPENAI_" + r"API_KEY=.+",
              r"\+" + r"1[0-9][0-9 ()-]{8,}",
          ]
          pattern = re.compile("(" + "|".join(pieces) + ")")
          hits = []
          for path in sorted(Path(".").rglob("*")):
              if ".git" in path.parts or not path.is_file():
                  continue
              try:
                  text = path.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  continue
              for line_number, line in enumerate(text.splitlines(), 1):
                  if pattern.search(line):
                      hits.append(f"{path}:{line_number}")
          if hits:
              print("\n".join(hits))
              raise SystemExit(1)
          PY
